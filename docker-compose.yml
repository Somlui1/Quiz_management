version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: quizmaster-app
    restart: unless-stopped
    ports:
      - "3344:3000"
    volumes:
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3000
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    networks:
      - quiz-network

  ngrok:
    image: ngrok/ngrok:latest
    container_name: ngrok_tunnel
    restart: unless-stopped
    entrypoint:
      - ngrok
      - http
      - app:3000
      - --log=stdout
    environment:
      - NGROK_AUTHTOKEN=3EqP4s2wJvtqdWljDlDVeVrlDI1_4onRdKSRgF4hBvh99mz8d
    depends_on:
      - app
    networks:
      - quiz-network

networks:
  quiz-network:
    driver: bridge
