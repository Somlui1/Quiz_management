version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: quizmaster-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    expose:
      - "3000"
    volumes:
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET}
      - PORT=3000
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    networks:
      - quiz-network

  nginx:
    image: nginx:alpine
    container_name: quizmaster-nginx
    restart: unless-stopped
    ports:
      - "3344:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    networks:
      - quiz-network

  ngrok:
    image: ngrok/ngrok:latest
    container_name: ngrok_tunnel
    restart: unless-stopped
    entrypoint:
      - ngrok
      - http
      - nginx:80
      - --log=stdout
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    depends_on:
      - nginx
    networks:
      - quiz-network

networks:
  quiz-network:
    driver: bridge
